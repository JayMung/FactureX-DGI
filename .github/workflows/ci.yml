name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annule les runs précédents sur la même branche/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Install · Type-check · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        # Pas de script `type-check` dans package.json (à ajouter plus tard).
        # On invoque tsc directement sur la config app.
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Build
        run: npm run build
        env:
          # Valeurs factices pour que Vite ne plante pas sur des `import.meta.env`
          # absentes au build. Les vraies valeurs viennent de Vercel / VPS en prod.
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          VITE_APP_URL: https://example.com
          VITE_APP_VERSION: ci
