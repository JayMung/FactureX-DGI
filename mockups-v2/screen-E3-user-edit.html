<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modifier utilisateur — FactureSmart</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','system-ui']}}}}}</script>
  <style>body{font-family:'Inter',system-ui,sans-serif}</style>
</head>
<body class="bg-gray-50 min-h-screen flex">
  <aside class="w-64 bg-white border-r border-gray-200 flex flex-col fixed h-full">
    <div class="px-6 py-5 border-b border-gray-100"><div class="flex items-center gap-3"><div class="w-9 h-9 bg-green-600 rounded-xl flex items-center justify-center"><i class="ri-file-paper-2-line text-white text-base"></i></div><span class="text-gray-900 text-base font-bold">FactureSmart</span></div></div>
    <div class="flex-1 px-4 py-4 space-y-1">
      <div class="px-3 py-2 mb-2"><span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Paramètres</span></div>
      <a href="screen-08-settings.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50"><i class="ri-settings-3-line text-lg text-gray-500"></i> Général</a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 bg-green-50 rounded-xl text-sm font-semibold text-green-700 border-l-[3px] border-green-600"><i class="ri-team-line text-lg"></i> Utilisateurs</a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50"><i class="ri-shield-key-line text-lg text-gray-500"></i> Sécurité</a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50"><i class="ri-notification-3-line text-lg text-gray-500"></i> Notifications</a>
    </div>
  </aside>
  <div class="flex-1 ml-64">
    <header class="bg-white border-b border-gray-200 px-8 py-4 flex items-center justify-between">
      <div><h1 class="text-xl font-bold text-gray-900">Modifier utilisateur</h1><p class="text-sm text-gray-500">Kimi Ngalula — Administrateur</p></div>
      <button class="px-4 py-2 bg-red-50 text-red-600 rounded-xl text-sm font-medium hover:bg-red-100 flex items-center gap-2"><i class="ri-delete-bin-line"></i> Supprimer</button>
    </header>
    <main class="p-8 max-w-xl">
      <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
        <div class="flex items-center gap-4 mb-6 pb-6 border-b border-gray-100">
          <div class="w-16 h-16 bg-green-100 rounded-2xl flex items-center justify-center text-2xl font-bold text-green-700">KN</div>
          <div>
            <h3 class="text-base font-bold text-gray-900">Kimi Ngalula</h3>
            <p class="text-sm text-gray-500">kimi@monentreprise.cd</p>
            <span class="inline-flex items-center gap-1 text-xs font-semibold text-green-700 bg-green-50 px-2 py-0.5 rounded-full mt-1"><span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span> Actif</span>
          </div>
        </div>
        <div class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="text-xs font-semibold text-gray-700 block mb-1.5">Prénom</label>
              <input type="text" value="Kimi" class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-green-100">
            </div>
            <div>
              <label class="text-xs font-semibold text-gray-700 block mb-1.5">Nom</label>
              <input type="text" value="Ngalula" class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-green-100">
            </div>
          </div>
          <div>
            <label class="text-xs font-semibold text-gray-700 block mb-1.5">Email</label>
            <input type="email" value="kimi@monentreprise.cd" class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-green-100">
          </div>
          <div>
            <label class="text-xs font-semibold text-gray-700 block mb-1.5">Rôle</label>
            <div class="relative">
              <select class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm text-gray-900 focus:outline-none appearance-none">
                <option selected>Administrateur</option>
                <option>Comptable</option>
                <option>Utilisateur</option>
                <option>Lecture seule</option>
              </select>
              <i class="ri-arrow-down-s-line absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            </div>
          </div>
          <div>
            <label class="text-xs font-semibold text-gray-700 block mb-1.5">Téléphone</label>
            <div class="flex gap-2">
              <span class="px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm text-gray-600 font-medium">+243</span>
              <input type="text" value="97 321 4567" class="flex-1 px-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-green-100">
            </div>
          </div>
        </div>
        <div class="flex gap-3 mt-6">
          <button class="flex-1 py-2.5 border border-gray-200 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50">Annuler</button>
          <button class="flex-1 py-2.5 bg-green-600 text-white rounded-xl text-sm font-semibold hover:bg-green-700">Enregistrer</button>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
