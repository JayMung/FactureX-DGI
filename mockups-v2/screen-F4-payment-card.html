<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paiement par carte — FactureX</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','system-ui']}}}}}</script>
  <style>body{font-family:'Inter',system-ui,sans-serif}</style>
</head>
<body class="min-h-screen bg-gray-50">
  <div class="max-w-lg mx-auto p-6">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-green-100 rounded-2xl flex items-center justify-center mx-auto mb-4"><i class="ri-credit-card-line text-green-600 text-3xl"></i></div>
      <h1 class="text-2xl font-extrabold text-gray-900">Paiement par carte</h1>
      <p class="text-gray-500 text-sm mt-1">Transaction sécurisée — Pack Professionnel</p>
    </div>
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 mb-4">
      <div class="flex justify-between items-center mb-4 pb-4 border-b border-gray-100">
        <span class="text-sm text-gray-600">Pack</span>
        <span class="text-sm font-bold text-gray-900">Professionnel — Annuel</span>
      </div>
      <div class="flex justify-between items-center mb-4">
        <span class="text-sm text-gray-600">Montant</span>
        <span class="text-2xl font-extrabold text-gray-900">CDF 1 200 000</span>
      </div>
      <div class="flex justify-between items-center text-sm">
        <span class="text-gray-400">Soit ~ USD 480</span>
        <span class="text-green-600 font-semibold text-sm">Économisez 20%</span>
      </div>
    </div>
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
      <div class="flex items-center gap-2 mb-4">
        <i class="ri-lock-line text-green-600"></i>
        <span class="text-xs font-semibold text-gray-700">Paiement 100% sécurisé</span>
      </div>
      <div class="space-y-4">
        <div>
          <label class="text-xs font-semibold text-gray-700 block mb-1.5">Numéro de carte</label>
          <div class="relative">
            <input type="text" value="4242 4242 4242 4242" class="w-full pl-4 pr-12 py-3 bg-white border border-gray-200 rounded-xl text-sm font-mono text-gray-900 focus:outline-none focus:ring-2 focus:ring-green-100">
            <div class="absolute right-3 top-1/2 -translate-y-1/2 flex gap-1"><div class="w-6 h-4 bg-blue-600 rounded"></div><div class="w-6 h-4 bg-red-500 rounded"></div></div>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs font-semibold text-gray-700 block mb-1.5">Date d'expiration</label>
            <input type="text" value="12/28" placeholder="MM/AA" class="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl text-sm font-mono text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-100">
          </div>
          <div>
            <label class="text-xs font-semibold text-gray-700 block mb-1.5">CVV</label>
            <input type="text" value="123" class="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl text-sm font-mono text-gray-900 focus:outline-none focus:ring-2 focus:ring-green-100">
          </div>
        </div>
        <div>
          <label class="text-xs font-semibold text-gray-700 block mb-1.5">Nom sur la carte</label>
          <input type="text" value="JEAN KIMUANA" class="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl text-sm text-gray-900 uppercase focus:outline-none focus:ring-2 focus:ring-green-100">
        </div>
      </div>
      <button class="w-full mt-6 py-3.5 bg-green-600 text-white rounded-xl text-sm font-bold shadow-lg shadow-green-600/20 hover:bg-green-700 flex items-center justify-center gap-2">
        <i class="ri-lock-line"></i> Payer CDF 1 200 000
      </button>
      <div class="flex items-center justify-center gap-4 mt-4 text-xs text-gray-400">
        <span>Visa</span>
        <span>Mastercard</span>
        <span>Sécurisé par SSL</span>
      </div>
    </div>
  </div>
</body>
</html>
