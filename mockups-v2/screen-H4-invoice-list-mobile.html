<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Factures — FactureX Mobile</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','system-ui']}}}}}</script>
  <style>body{font-family:'Inter',system-ui,sans-serif}</style>
</head>
<body class="bg-gray-100 min-h-screen">
  <!-- Top bar -->
  <div class="bg-white px-4 pt-10 pb-3 flex items-center justify-between sticky top-0 z-10">
    <div class="flex items-center gap-2"><div class="w-8 h-8 bg-green-600 rounded-xl flex items-center justify-center"><i class="ri-file-paper-2-line text-white text-sm"></i></div><span class="text-gray-900 text-base font-bold">FactureX</span></div>
    <button class="w-9 h-9 bg-green-50 rounded-xl flex items-center justify-center"><i class="ri-add-line text-green-600 text-lg"></i></button>
  </div>
  <!-- Tabs -->
  <div class="bg-white px-4 flex gap-6 border-b border-gray-200">
    <button class="pb-3 text-sm font-bold text-green-600 border-b-2 border-green-600">Factures</button>
    <button class="pb-3 text-sm font-medium text-gray-400">Devis</button>
    <button class="pb-3 text-sm font-medium text-gray-400">Brouillons</button>
  </div>
  <!-- Search -->
  <div class="px-4 py-3">
    <div class="relative"><i class="ri-search-line text-gray-400 absolute left-3 top-1/2 -translate-y-1/2"></i><input type="text" placeholder="Rechercher une facture..." class="w-full pl-9 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm text-gray-900 placeholder-gray-400 focus:outline-none"></div>
  </div>
  <!-- Stats row -->
  <div class="px-4 pb-3 flex gap-3 overflow-x-auto">
    <div class="bg-white rounded-xl px-3 py-2.5 flex items-center gap-2 whitespace-nowrap border border-gray-100 shadow-sm">
      <span class="text-xs text-gray-500">Ce mois</span>
      <span class="text-sm font-bold text-gray-900">42</span>
    </div>
    <div class="bg-white rounded-xl px-3 py-2.5 flex items-center gap-2 whitespace-nowrap border border-gray-100 shadow-sm">
      <span class="w-2 h-2 bg-green-500 rounded-full"></span>
      <span class="text-xs text-gray-500">Validées</span>
      <span class="text-sm font-bold text-green-700">35</span>
    </div>
    <div class="bg-white rounded-xl px-3 py-2.5 flex items-center gap-2 whitespace-nowrap border border-gray-100 shadow-sm">
      <span class="w-2 h-2 bg-amber-500 rounded-full"></span>
      <span class="text-xs text-gray-500">En attente</span>
      <span class="text-sm font-bold text-amber-700">7</span>
    </div>
  </div>
  <!-- Invoice list -->
  <div class="px-4 space-y-2 pb-20">
    <a href="screen-H6-invoice-mobile.html" class="block bg-white rounded-2xl border border-gray-100 shadow-sm p-4 hover:shadow-md transition-shadow">
      <div class="flex justify-between items-start mb-2">
        <div>
          <p class="text-sm font-bold text-gray-900">FAC-2026-0143</p>
          <p class="text-xs text-gray-400 mt-0.5">Congo Freight SPRL</p>
        </div>
        <span class="bg-green-100 text-green-700 text-[10px] font-bold px-2 py-1 rounded-full border border-green-200">Validée</span>
      </div>
      <div class="flex justify-between items-center">
        <p class="text-sm font-bold text-gray-900">CDF 1 850 000</p>
        <p class="text-[10px] text-gray-400">22 avr. 2026</p>
      </div>
    </a>
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
      <div class="flex justify-between items-start mb-2">
        <div>
          <p class="text-sm font-bold text-gray-900">FAC-2026-0142</p>
          <p class="text-xs text-gray-400 mt-0.5">Minexco SARL</p>
        </div>
        <span class="bg-green-100 text-green-700 text-[10px] font-bold px-2 py-1 rounded-full border border-green-200">Validée</span>
      </div>
      <div class="flex justify-between items-center">
        <p class="text-sm font-bold text-gray-900">CDF 3 200 000</p>
        <p class="text-[10px] text-gray-400">21 avr. 2026</p>
      </div>
    </div>
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
      <div class="flex justify-between items-start mb-2">
        <div>
          <p class="text-sm font-bold text-gray-900">FAC-2026-0141</p>
          <p class="text-xs text-gray-400 mt-0.5">LogiTrans SAS</p>
        </div>
        <span class="bg-amber-100 text-amber-700 text-[10px] font-bold px-2 py-1 rounded-full border border-amber-200">En attente</span>
      </div>
      <div class="flex justify-between items-center">
        <p class="text-sm font-bold text-gray-900">CDF 980 000</p>
        <p class="text-[10px] text-gray-400">20 avr. 2026</p>
      </div>
    </div>
  </div>
  <!-- Bottom nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around py-2 px-4">
    <a href="#" class="flex flex-col items-center gap-0.5"><i class="ri-dashboard-line text-gray-400 text-xl"></i><span class="text-[10px] text-gray-400">Dashboard</span></a>
    <a href="#" class="flex flex-col items-center gap-0.5"><i class="ri-file-list-3-line text-green-600 text-xl"></i><span class="text-[10px] text-green-600 font-semibold">Factures</span></a>
    <a href="#" class="flex flex-col items-center gap-0.5"><i class="ri-user-line text-gray-400 text-xl"></i><span class="text-[10px] text-gray-400">Clients</span></a>
    <a href="#" class="flex flex-col items-center gap-0.5"><i class="ri-settings-3-line text-gray-400 text-xl"></i><span class="text-[10px] text-gray-400">Compte</span></a>
  </nav>
</body>
</html>
