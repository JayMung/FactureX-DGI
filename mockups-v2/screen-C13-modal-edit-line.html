<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modifier la ligne — FactureSmart</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','system-ui']}}}}}</script>
  <style>body{font-family:'Inter',system-ui,sans-serif}</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-2xl border border-gray-100">
      <div class="p-5 border-b border-gray-100 flex items-center justify-between">
        <h3 class="text-base font-bold text-gray-900">Modifier la ligne</h3>
        <button class="text-gray-400 hover:text-gray-600 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100"><i class="ri-close-line text-lg"></i></button>
      </div>
      <div class="p-5 space-y-4">
        <div>
          <label class="text-xs font-semibold text-gray-700 block mb-1.5">Désignation *</label>
          <input type="text" value="Transport fret maritime" class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-green-100 focus:border-green-300">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs font-semibold text-gray-700 block mb-1.5">Quantité *</label>
            <input type="number" value="1" class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-green-100">
          </div>
          <div>
            <label class="text-xs font-semibold text-gray-700 block mb-1.5">Prix unitaire (CDF) *</label>
            <input type="text" value="2 000 000" class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-green-100">
          </div>
        </div>
        <div>
          <label class="text-xs font-semibold text-gray-700 block mb-1.5">TVA</label>
          <div class="relative">
            <select class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm text-gray-900 focus:outline-none appearance-none">
              <option selected>18% — Standard</option>
              <option>0% — Exonéré</option>
            </select>
            <i class="ri-arrow-down-s-line absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
          </div>
        </div>
        <div class="flex justify-between items-center pt-3 border-t border-gray-100">
          <span class="text-xs text-gray-500">Montant HT</span>
          <span class="text-sm font-bold text-gray-900">CDF 2 000 000</span>
        </div>
      </div>
      <div class="p-5 border-t border-gray-100 flex gap-3">
        <button class="flex-1 py-2.5 border border-red-200 text-red-600 rounded-xl text-sm font-medium hover:bg-red-50 flex items-center justify-center gap-2"><i class="ri-delete-bin-line"></i> Supprimer</button>
        <button class="flex-1 py-2.5 bg-green-600 text-white rounded-xl text-sm font-semibold hover:bg-green-700">Enregistrer</button>
      </div>
    </div>
  </div>
</body>
</html>
