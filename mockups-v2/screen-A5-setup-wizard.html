<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuration initiale — FactureSmart</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','system-ui']}}}}}</script>
  <style>body{font-family:'Inter',system-ui,sans-serif}</style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-8">
  <div class="w-full max-w-lg">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-green-600 rounded-2xl flex items-center justify-center mx-auto mb-4"><i class="ri-settings-3-line text-white text-2xl"></i></div>
      <h1 class="text-2xl font-extrabold text-gray-900">Configuration initiale</h1>
      <p class="text-gray-500 text-sm mt-1">Configurez votre espace en 2 minutes</p>
    </div>
    <div class="flex items-center justify-center gap-2 mb-6">
      <div class="flex items-center gap-2"><div class="w-8 h-8 bg-green-600 rounded-full flex items-center justify-center"><span class="text-white text-xs font-bold">1</span></div><span class="text-xs font-medium text-green-700">Entreprise</span></div>
      <div class="w-8 h-px bg-gray-300"></div>
      <div class="flex items-center gap-2"><div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center"><span class="text-gray-500 text-xs font-bold">2</span></div><span class="text-xs font-medium text-gray-400">NIF/RCCM</span></div>
      <div class="w-8 h-px bg-gray-300"></div>
      <div class="flex items-center gap-2"><div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center"><span class="text-gray-500 text-xs font-bold">3</span></div><span class="text-xs font-medium text-gray-400">Logo</span></div>
      <div class="w-8 h-px bg-gray-300"></div>
      <div class="flex items-center gap-2"><div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center"><span class="text-gray-500 text-xs font-bold">4</span></div><span class="text-xs font-medium text-gray-400">Confirmer</span></div>
    </div>
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
      <h2 class="text-lg font-bold text-gray-900 mb-4">Profil entreprise</h2>
      <div class="space-y-4">
        <div>
          <label class="text-xs font-semibold text-gray-700 block mb-1.5">Raison sociale *</label>
          <input type="text" value="Mon Entreprise SARL" class="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-green-100 focus:border-green-300">
        </div>
        <div>
          <label class="text-xs font-semibold text-gray-700 block mb-1.5">Secteur d'activité *</label>
          <div class="relative">
            <select class="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl text-sm text-gray-900 focus:outline-none appearance-none">
              <option>Commerce général</option>
              <option>Transport & Logistique</option>
              <option>Services IT</option>
              <option>Construction</option>
            </select>
            <i class="ri-arrow-down-s-line absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
          </div>
        </div>
        <div>
          <label class="text-xs font-semibold text-gray-700 block mb-1.5">Téléphone</label>
          <div class="flex gap-2">
            <span class="px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm text-gray-600 font-medium">+243</span>
            <input type="text" value="97 123 4567" class="flex-1 px-4 py-3 bg-white border border-gray-200 rounded-xl text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-green-100">
          </div>
        </div>
        <div>
          <label class="text-xs font-semibold text-gray-700 block mb-1.5">Adresse complète</label>
          <textarea rows="2" class="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-green-100 resize-none">Avenue du Commerce, Gombe, Kinshasa, RDC</textarea>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button class="px-5 py-2.5 border border-gray-200 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50">Précédent</button>
        <button class="flex-1 py-2.5 bg-green-600 text-white rounded-xl text-sm font-semibold hover:bg-green-700 flex items-center justify-center gap-2">Suivant <i class="ri-arrow-right-line"></i></button>
      </div>
    </div>
  </div>
</body>
</html>
